<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nueva Contraseña — Floratta</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #f9f6f0;
            font-family: 'Jost', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 24px rgba(45,74,62,0.10);
            text-align: center;
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: #2d4a3e;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .subtitulo {
            color: #8a9e8a;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }
        h2 {
            font-family: 'Cormorant Garamond', serif;
            color: #2d4a3e;
            font-size: 22px;
            margin-bottom: 12px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .alerta {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .alerta.error { background: #fdecea; color: #c0392b; }
        label {
            display: block;
            text-align: left;
            font-size: 13px;
            color: #2d4a3e;
            margin-bottom: 6px;
            font-weight: 500;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #c8c9a8;
            border-radius: 8px;
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }
        input[type="password"]:focus { border-color: #2d4a3e; }
        button {
            width: 100%;
            padding: 13px;
            background: #2d4a3e;
            color: #c8c9a8;
            border: none;
            border-radius: 8px;
            font-family: 'Jost', sans-serif;
            font-size: 15px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #1e3328; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Floratta</div>
        <div class="subtitulo">Bake Studio</div>

        <h2>Nueva contraseña</h2>
        <p>Elige una contraseña segura de al menos 6 caracteres.</p>

        <div th:if="${error}" class="alerta error" th:text="${error}"></div>

        <form th:action="@{/recuperar-password/nueva}" method="post">
            <input type="hidden" name="token" th:value="${token}"/>

            <label for="password">Nueva contraseña</label>
            <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required/>

            <label for="confirmarPassword">Confirmar contraseña</label>
            <input type="password" id="confirmarPassword" name="confirmarPassword" placeholder="Repite la contraseña" required/>

            <button type="submit">Guardar contraseña</button>
        </form>
    </div>
</body>
</html>
