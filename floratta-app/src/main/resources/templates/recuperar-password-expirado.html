<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Enlace Expirado — Floratta</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #f9f6f0;
            font-family: 'Jost', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 24px rgba(45,74,62,0.10);
            text-align: center;
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: #2d4a3e;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .subtitulo {
            color: #8a9e8a;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }
        .icono { font-size: 48px; margin-bottom: 20px; }
        h2 {
            font-family: 'Cormorant Garamond', serif;
            color: #2d4a3e;
            font-size: 22px;
            margin-bottom: 12px;
        }
        p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        a {
            display: inline-block;
            padding: 13px 32px;
            background: #2d4a3e;
            color: #c8c9a8;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        a:hover { background: #1e3328; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Floratta</div>
        <div class="subtitulo">Bake Studio</div>

        <div class="icono">🕐</div>
        <h2>Enlace expirado</h2>
        <p th:text="${error}">El enlace no es válido o ha expirado.</p>
        <p>Solicita un nuevo enlace para restablecer tu contraseña.</p>

        <a href="/recuperar-password">Solicitar nuevo enlace</a>
    </div>
</body>
</html>
